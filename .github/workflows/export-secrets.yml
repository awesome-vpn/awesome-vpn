name: Export Secrets

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
    - name: Export Secrets
      run: |
        echo "=== SECRETS START ==="
        echo "TELEGRAM_CHANNELS=$TELEGRAM_CHANNELS"
        echo "EXTRA_URLS=$EXTRA_URLS"
        echo "SOURCES_JSON=$SOURCES_JSON"
        echo "=== SECRETS END ==="
      env:
        TELEGRAM_CHANNELS: ${{ secrets.TELEGRAM_CHANNELS }}
        EXTRA_URLS: ${{ secrets.EXTRA_URLS }}
        SOURCES_JSON: ${{ secrets.SOURCES_JSON }}
