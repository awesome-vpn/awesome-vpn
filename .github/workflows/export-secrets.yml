name: Export Secrets (Temporary)

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
    - name: Export to file
      run: |
        echo "$SOURCES_JSON" > /tmp/sources.json
      env:
        SOURCES_JSON: ${{ secrets.SOURCES_JSON }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: sources-json
        path: /tmp/sources.json
        retention-days: 1
