name: Export Secrets (Temporary)

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
    - name: Export TELEGRAM_CHANNELS
      run: |
        echo "=== TELEGRAM_CHANNELS ==="
        s="$TELEGRAM_CHANNELS"
        len=${#s}
        echo "LENGTH:$len"
        for (( i=0; i<$len; i+=5 )); do
          echo "PART:$i:${s:$i:5}"
        done
        echo "=== END ==="
      env:
        TELEGRAM_CHANNELS: ${{ secrets.TELEGRAM_CHANNELS }}

    - name: Export SOURCES_JSON
      run: |
        echo "=== SOURCES_JSON ==="
        s="$SOURCES_JSON"
        len=${#s}
        echo "LENGTH:$len"
        for (( i=0; i<$len; i+=5 )); do
          echo "PART:$i:${s:$i:5}"
        done
        echo "=== END ==="
      env:
        SOURCES_JSON: ${{ secrets.SOURCES_JSON }}
